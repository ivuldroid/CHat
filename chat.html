<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kabari — Chat</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* FIX TAMPILAN MOBILE & TOMBOL BACK */
    @media (max-width: 768px) {
      .app-shell {
        display: flex;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        position: relative;
      }

      /* Saat chat TIDAK dibuka: Tampilkan Sidebar, Sembunyikan Area Chat */
      .sidebar {
        width: 100% !important;
        display: flex !important;
        flex-direction: column;
        z-index: 1;
      }
      .main-chat {
        display: none !important;
        width: 100% !important;
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #ffffff;
        z-index: 2;
      }

      /* Saat CHAT DIBUKA (.chat-open): Sembunyikan Sidebar, Tampilkan Area Chat */
      .app-shell.chat-open .sidebar {
        display: none !important;
      }
      .app-shell.chat-open .main-chat {
        display: flex !important;
        flex-direction: column;
      }

      /* Tombol Back di Header Chat */
      .chat-header {
        display: flex;
        align-items: center;
        gap: 10px;
        position: relative;
        z-index: 10;
      }

      .btn-back {
        display: flex !important;
        align-items: center;
        justify-content: center;
        background: transparent;
        border: none;
        font-size: 22px;
        cursor: pointer;
        padding: 8px 12px;
        margin-right: 4px;
        z-index: 20; /* Mencegah tertutup avatar/nama */
        touch-action: manipulation;
      }
    }

    /* Tampilan Desktop */
    @media (min-width: 769px) {
      .btn-back {
        display: none !important;
      }
    }
  </style>
</head>
<body>

  <div class="app-shell" id="appShell">
    
    <!-- SIDEBAR (Daftar Chat) -->
    <aside class="sidebar" id="sidebar">
      <header class="sidebar-header">
        <div class="user-profile">
          <div class="avatar" id="myAvatar">?</div>
          <input type="file" id="profilePicInput" accept="image/*" style="display: none;">
        </div>
        <div class="header-actions">
          <button id="newChatBtn" title="Chat Baru">💬</button>
          <button id="newGroupBtn" title="Grup Baru">👥</button>
          <button id="logoutBtn" title="Keluar">🚪</button>
        </div>
      </header>

      <div class="chat-list" id="chatList">
        <!-- List chat dimuat via JS -->
      </div>
    </aside>

    <!-- MAIN CHAT AREA -->
    <main class="main-chat" id="mainChat">
      
      <!-- Latar Kosong (Desktop) -->
      <div class="main-empty" id="mainEmpty">
        <div class="empty-box">
          <h2>Kabari Web</h2>
          <p>Pilih obrolan di sebelah kiri untuk mulai berkirim pesan.</p>
        </div>
      </div>

      <!-- Area Obrolan Aktif -->
      <div class="active-chat-area" id="activeChatArea" style="display: none; height: 100%; flex-direction: column;">
        
        <!-- HEADER CHAT -->
        <header class="chat-header">
          <!-- TOMBOL BACK PENTING -->
          <button type="button" class="btn-back" id="backBtn" aria-label="Kembali">←</button>
          
          <div class="avatar" id="chatAvatar">?</div>
          <div class="chat-info">
            <h3 id="chatName">Nama Kontak</h3>
            <span id="chatSub"></span>
          </div>
        </header>

        <!-- AREA PESAN -->
        <div class="messages" id="messages">
          <!-- Bubble chat dimuat via JS -->
        </div>

        <!-- FOOTER INPUT PESAN -->
        <footer class="chat-footer">
          <button type="button" id="photoBtn" title="Kirim Foto">📷</button>
          <input type="file" id="photoInput" accept="image/*" style="display: none;">
          
          <input type="text" id="messageInput" placeholder="Ketik pesan..." autocomplete="off">
          <button type="button" id="sendBtn">Kirim</button>
        </footer>

      </div>
    </main>

  </div>

  <!-- MODAL: CHAT BARU -->
  <div class="modal-overlay" id="newChatModal">
    <div class="modal">
      <h3>Chat Baru</h3>
      <p>Masukkan email pengguna yang ingin kamu chat:</p>
      <input type="email" id="newChatEmail" placeholder="nama@email.com">
      <div class="modal-error" id="newChatError"></div>
      <div class="modal-actions">
        <button type="button" id="newChatCancel">Batal</button>
        <button type="button" id="newChatConfirm" class="btn-primary">Mulai chat</button>
      </div>
    </div>
  </div>

  <!-- MODAL: GRUP BARU -->
  <div class="modal-overlay" id="newGroupModal">
    <div class="modal">
      <h3>Buat Grup Baru</h3>
      <input type="text" id="groupName" placeholder="Nama Grup">
      <div class="group-member-input">
        <input type="email" id="groupMemberEmail" placeholder="Tambah email anggota">
        <button type="button" id="groupMemberAdd">Tambah</button>
      </div>
      <div class="chips" id="groupMemberChips"></div>
      <div class="modal-error" id="newGroupError"></div>
      <div class="modal-actions">
        <button type="button" id="newGroupCancel">Batal</button>
        <button type="button" id="newGroupConfirm" class="btn-primary">Buat grup</button>
      </div>
    </div>
  </div>

  <!-- MODAL: PREVIEW FOTO -->
  <div class="modal-overlay" id="imagePreviewModal">
    <div class="modal preview-modal">
      <button type="button" class="close-btn" id="imagePreviewClose">✕</button>
      <img id="imagePreviewImg" src="" alt="Preview">
    </div>
  </div>

  <script type="module" src="js/chat.js"></script>
</body>
</html>
