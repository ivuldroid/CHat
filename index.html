<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
<title>Market — Masuk</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="wordmark">Market</div>
      <p>COD tanpa ribet.</p>
    </div>

    <div class="auth-tabs">
      <button id="tabLogin" class="active" type="button">Masuk</button>
      <button id="tabRegister" type="button">Daftar</button>
    </div>

    <div id="authError" class="auth-error"></div>

    <!-- ===== FORM LOGIN ===== -->
    <form id="loginForm">
      <div class="field">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" required autocomplete="email" placeholder="kamu@email.com">
      </div>
      <div class="field">
        <label for="loginPassword">Kata sandi</label>
        <input type="password" id="loginPassword" required autocomplete="current-password" placeholder="••••••••">
      </div>
      <button type="submit" class="auth-submit" id="loginSubmit">Masuk</button>
    </form>

    <!-- ===== FORM REGISTER ===== -->
    <form id="registerForm" style="display:none;">
      <div class="field">
        <label for="regName">Nama tampilan</label>
        <input type="text" id="regName" required autocomplete="name" placeholder="Nama kamu">
      </div>
      <div class="field">
        <label for="regEmail">Email</label>
        <input type="email" id="regEmail" required autocomplete="email" placeholder="kamu@email.com">
      </div>
      <div class="field">
        <label for="regPassword">Kata sandi</label>
        <input type="password" id="regPassword" required autocomplete="new-password" placeholder="Minimal 6 karakter" minlength="6">
      </div>
      <button type="submit" class="auth-submit" id="registerSubmit">Buat akun</button>
    </form>

    <p class="auth-hint">Data kamu tersimpan di Firebase project kamu sendiri.</p>
  </div>
</div>

<script type="module" src="js/auth.js"></script>
</body>
</html>
